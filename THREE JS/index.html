<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roket Game - 3D Engine</title>
 
    <link rel="stylesheet" href="style.css">

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="ui-layer">
        <div class="terminal-box" style="text-align: center;">
            <h2 style="color: #00ffff; letter-spacing: 2px;">[ SYSTEM INITIALIZATION ]</h2>
            <p id="status-text" style="margin-bottom: 30px;">AWAITING COMMANDER'S AUTHORIZATION...</p>
            
            <button id="btn-start-mission" style="padding: 15px 30px; font-size: 18px; font-weight: bold; font-family: 'Courier New', monospace; background-color: transparent; color: #00ffff; border: 2px solid #00ffff; cursor: pointer; text-shadow: 0 0 5px #00ffff; box-shadow: 0 0 10px rgba(0, 255, 255, 0.3); border-radius: 5px; transition: all 0.3s ease;">
                [ INIT SEQUENCE : START ]
            </button>
        </div>
    </div>

    <div id="flash-overlay" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: white; opacity: 0; pointer-events: none; transition: opacity 1.5s ease-in-out; z-index: 9999;"></div>
    <div id="comms-layer" style="display: none;">
        <div class="comms-box">
            <p class="blink-text" style="color: #ff3333;">[ INCOMING TRANSMISSION ]</p>
            <h3>CALLER: COMMAND CENTER</h3>
            
            <div class="button-group">
                <button id="accept-btn">ACCEPT</button>
                <button id="decline-btn">DECLINE</button>
            </div>
        </div>
    </div>

    <div id="ai-companion" style="display: none;">
        <div class="ai-avatar">
            <img src="assets/Avatar_AI.svg" alt="AI Avatar" class="ai-image-core">
            
            <span>A.I. SYS</span>
        </div>
        <div class="ai-dialogue">
            <p id="ai-text"></p>
        </div>
    </div>

    <div id="nav-layer" style="display: none;">
        <div class="nav-box">
            <h3 style="color: #00ffff; margin-bottom: 5px;">[ PERINGATAN SISTEM ]</h3>
            <p style="margin-bottom: 20px; font-size: 14px;">Navigasi otomatis terganggu. Silakan pilih rute manual menuju Planet Asal.</p>
            
        <div class="nav-grid">
                <button class="nav-btn" data-path="Mesin">[ PERBAIKI MESIN UTAMA ]</button>
                <button class="nav-btn" data-path="Navigasi">[ KALIBRASI NAVIGASI MANUAL ]</button>
                <button class="nav-btn" data-path="Bensin">[ AKTIFKAN CADANGAN BAHAN BAKAR ]</button>
                <button class="nav-btn" data-path="Blackhole">[ MANUVER DARURAT: HINDARI BLACKHOLE ]</button>
        </div>
        </div>
    </div>
    
    <div id="glitch-overlay"></div>

    <script type="module" src="index.js"></script>

    <div id="radar-container" style="display: none;"> 
        <div class="radar-grid"></div>
        <div class="radar-sweep"></div>
        <div id="enemy-blip" class="blip hostile"></div>
    </div>

    <div id="odometer" style="position: absolute; top: 20px; right: 20px; color: #00ffcc; font-family: 'Courier New', monospace; font-size: 18px; z-index: 1000; text-shadow: 0 0 10px #00ffcc;">
        DISTANCE: <span id="jarak-tempuh">00000</span> LY
    </div>

</body>
</html>
